version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neurosynth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neurosynth:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEUROSYNTH_POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/neurosynth
      - NEUROSYNTH_REDIS_URL=redis://redis:6379/0
    volumes:
      - ./alzheimers_disease_data.csv:/app/alzheimers_disease_data.csv
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
