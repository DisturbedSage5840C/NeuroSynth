# NeuroSynth — Prometheus Scrape Configuration
# Deploy to: infrastructure/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: "neurosynth-prod"
    environment: "production"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# Recording & alerting rules
rule_files:
  - "rules/*.yml"

# Scrape targets
scrape_configs:
  # NeuroSynth FastAPI backend
  - job_name: "neurosynth-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets:
          - "neurosynth-api:8000"
        labels:
          service: "neurosynth-api"
          component: "backend"

  # NeuroSynth model server
  - job_name: "neurosynth-model-server"
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "neurosynth-model:8001"
        labels:
          service: "neurosynth-model"
          component: "inference"

  # Node exporter (host metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

  # NVIDIA GPU exporter
  - job_name: "gpu-exporter"
    scrape_interval: 10s
    static_configs:
      - targets:
          - "dcgm-exporter:9400"
        labels:
          component: "gpu"

  # Redis exporter
  - job_name: "redis-exporter"
    static_configs:
      - targets:
          - "redis-exporter:9121"

  # PostgreSQL exporter
  - job_name: "postgres-exporter"
    static_configs:
      - targets:
          - "postgres-exporter:9187"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
