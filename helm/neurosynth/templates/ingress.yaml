apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "neurosynth.fullname" . }}-ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-east-1:123456789012:regional/webacl/neurosynth/abcd
spec:
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "neurosynth.fullname" . }}-api
            port:
              number: {{ .Values.api.servicePort }}
