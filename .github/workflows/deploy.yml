name: neurosynth-cicd

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-build-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install CI smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pydantic pydantic-settings python-dotenv
      - name: Run smoke tests
        env:
          PYTHONPATH: src
        run: pytest -q tests/test_llm_schemas.py
      - name: Release gate
        env:
          NEURO_JWKS_URL: https://auth.example.local/.well-known/jwks.json
          NEURO_ALLOWED_ORIGINS: https://api.example.local
          NEURO_REDIS_URL: redis://localhost:6379/0
        run: python scripts/release_gate.py
      - name: Build image
        run: docker build -t neurosynth:${{ github.sha }} .
      - name: Trivy scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: neurosynth:${{ github.sha }}
          format: table
      - name: Semgrep scan
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1

