name: neurosynth-cicd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: neurosynth/app
  DOCKER_BUILDKIT: "1"

jobs:
  ci-matrix:
    name: ci-${{ matrix.python-version }}-${{ matrix.accelerator }}
    # GPU runners must be configured in your org/repo runner groups with these labels.
    runs-on: ${{ matrix.accelerator == 'gpu' && fromJSON('["self-hosted","linux","x64","gpu"]') || fromJSON('["ubuntu-latest"]') }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        accelerator: ["cpu", "gpu"]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: src
        run: pytest -q --cov

      - name: Release gate
        env:
          NEURO_HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NEURO_TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
        run: python scripts/release_gate.py

      - name: Build container image (local for scan)
        uses: docker/setup-buildx-action@v3

      - name: Docker build for Trivy scan
        run: docker buildx build --load -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .

      - name: Trivy security scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.python-version }}-${{ matrix.accelerator }}.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.python-version }}-${{ matrix.accelerator }}.sarif

  docker-push:
    name: docker-push
    runs-on: ubuntu-latest
    needs: [ci-matrix]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # If DOCKERHUB_USERNAME is not configured, this falls back to repo owner.
          username: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm upgrade/install staging
        run: |
          helm upgrade --install neurosynth-staging ./helm/neurosynth \
            --namespace neurosynth-staging \
            --create-namespace \
            --values ./helm/neurosynth/values.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }}

  deploy-prod:
    name: deploy-prod
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Manual approval gate is handled by required reviewers on the prod environment.
    environment:
      name: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm upgrade/install production
        run: |
          helm upgrade --install neurosynth ./helm/neurosynth \
            --namespace neurosynth-prod \
            --create-namespace \
            --values ./helm/neurosynth/values.yaml \
            --values ./helm/neurosynth/values-prod.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }}

